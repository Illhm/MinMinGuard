name: Android CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.jvmargs=-Xmx2048m
    -Dfile.encoding=UTF-8
  KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
  KEY_PASS: ${{ secrets.KEY_PASS }}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install legacy Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            'platform-tools' \
            'platforms;android-29' \
            'build-tools;29.0.0'

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Show Gradle version
        run: ./gradlew --version

      - name: Build debug APK
        run: ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MinMinGuard-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Build release APK on version tag
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_PASS != '' && env.KEY_PASS != ''
        run: ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Rename release APK
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_PASS != '' && env.KEY_PASS != ''
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk release/MinMinGuard-${GITHUB_REF_NAME}.apk

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v') && env.KEYSTORE_PASS != '' && env.KEY_PASS != ''
        uses: actions/upload-artifact@v4
        with:
          name: MinMinGuard-release-apk
          path: release/*.apk
          if-no-files-found: error
          retention-days: 30
